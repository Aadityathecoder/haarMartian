<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4 Quadrant GUI Webserver</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-color: #f0f0f0;
        }

        .header {
            background-color: #333;
            color: white;
            padding: 5px 10px;
            font-size: 0.9em;
            text-align: center;
        }

        #martian-alert {
            position: fixed;
            top: 38px;
            left: 50%;
            transform: translateX(-50%);
            background: #b00000;
            color: white;
            border: 2px solid #ffdddd;
            padding: 14px 28px;
            font-size: 1.4em;
            font-weight: bold;
            z-index: 9999;
            display: none;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45);
        }

        .quadrant-container {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            width: 100%;
        }

        .quadrant-row {
            display: flex;
            flex-basis: 50%;
            width: 100%;
        }

        .quadrant {
            border: 1px solid #ccc;
            flex-basis: 50%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            background-color: #808080;
            color: white;
        }

        .quadrant-header {
            background-color: #6a6a6a;
            padding: 8px;
            font-weight: bold;
            border-bottom: 1px solid #999;
            color: white;
        }

        .quadrant-content {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            background-color: black;
            padding: 0;
        }

        .quadrant-content img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            margin: auto;
        }

        #quadrant2 .quadrant-content {
            display: grid;
            grid-template-columns: 1fr auto auto auto 1fr;
            grid-template-rows: 1fr auto auto auto 1fr;
            grid-template-areas:
                ". .      forward    .        ."
                ". left   start_stop right    ."
                ". .      backward   .        .";
            gap: 10px;
            padding: 15px;
            background-color: #808080;
            justify-items: center;
            align-items: center;
        }

        .start-stop-wrapper {
            grid-area: start_stop;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }

        .control-button {
            background-color: #e0e0e0;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            transition: background-color 0.2s;
            width: 90px;
            text-align: center;
            color: #333;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .control-button:hover {
            background-color: #d0d0d0;
        }

        #forward {
            grid-area: forward;
        }

        #left {
            grid-area: left;
        }

        #right {
            grid-area: right;
        }

        #backward {
            grid-area: backward;
        }

        #quadrant4 .quadrant-content {
            background-color: #333;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            text-align: left;
            align-items: flex-start;
            overflow-y: scroll;
            padding: 10px;
            display: block;
        }

        #console-log {
            white-space: pre-wrap;
            margin: 0;
            padding: 0;
            font-size: 0.9em;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="header">4 Quadrant GUI Webserver</div>

    <div id="martian-alert">MARTIAN DETECTED!!!</div>

    <div class="quadrant-container">
        <div class="quadrant-row">
            <div class="quadrant" id="quadrant1">
                <div class="quadrant-header">Quadrant 1: Live Feed</div>
                <div class="quadrant-content">
                    <img id="rawStream" alt="Live Video Feed 1">
                </div>
            </div>

            <div class="quadrant" id="quadrant2">
                <div class="quadrant-header">Quadrant 2: Controls</div>

                <div class="quadrant-content">
                    <button class="control-button" id="forward">Forward</button>
                    <button class="control-button" id="left">Left</button>

                    <div class="start-stop-wrapper">
                        <button class="control-button" id="start">Start</button>
                        <button class="control-button" id="stop">Stop</button>
                    </div>

                    <button class="control-button" id="right">Right</button>
                    <button class="control-button" id="backward">Backward</button>
                </div>
            </div>
        </div>

        <div class="quadrant-row">
            <div class="quadrant" id="quadrant3">
                <div class="quadrant-header">Quadrant 3: Processed Feed</div>

                <div class="quadrant-content">
                    <img id="videoStream" alt="Live Video Feed 2">
                </div>
            </div>

            <div class="quadrant" id="quadrant4">
                <div class="quadrant-header">Quadrant 4: Console</div>

                <div class="quadrant-content" id="console-quadrant">
                    <pre id="console-log"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const consoleLog = document.getElementById('console-log');
        const consoleQuadrant = document.getElementById('console-quadrant');
        const martianAlert = document.getElementById('martian-alert');

        const BASE = window.location.origin;

        document.getElementById('rawStream').src = `${BASE}/video_feed`;
        document.getElementById('videoStream').src = `${BASE}/video_feed/processed`;

        function log(s) {
            const now = new Date().toLocaleTimeString();
            consoleLog.textContent += `[${now}] ${s}\n`;
            consoleQuadrant.scrollTop = consoleQuadrant.scrollHeight;
        }

        async function sendState(payload) {
            try {
                const r = await fetch(`${BASE}/control/set`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const j = await r.json();

                if (j.ok) {
                    log(`POST /control/set -> ${JSON.stringify(j.state)}`);
                } else {
                    log(`ERROR: ${j.error || "Unknown control error"}`);
                }
            } catch (e) {
                log(`ERROR: Could not reach API at ${BASE}. Check server console.`);
            }
        }

        function commandToPayload(cmd) {
            const p = {
                up: false,
                down: false,
                left: false,
                right: false,
                command: cmd
            };

            if (cmd === "forward") {
                p.up = true;
            }

            if (cmd === "backward") {
                p.down = true;
            }

            if (cmd === "left") {
                p.left = true;
            }

            if (cmd === "right") {
                p.right = true;
            }

            if (cmd === "stop") {
                p.up = false;
                p.down = false;
                p.left = false;
                p.right = false;
            }

            return p;
        }

        function sendCommand(cmd) {
            const payload = commandToPayload(cmd);
            sendState(payload);
            log(`COMMAND: ${cmd}`);
        }

        async function pollMartianAlert() {
            try {
                const r = await fetch(`${BASE}/alerts/status`);
                const j = await r.json();

                if (j.martian_detected) {
                    martianAlert.textContent = j.message || "MARTIAN DETECTED!!!";
                    martianAlert.style.display = "block";
                } else {
                    martianAlert.style.display = "none";
                }
            } catch (e) {
                // Do nothing here to avoid filling the console repeatedly.
            }
        }

        document.getElementById('forward').onclick = () => sendCommand('forward');
        document.getElementById('backward').onclick = () => sendCommand('backward');
        document.getElementById('left').onclick = () => sendCommand('left');
        document.getElementById('right').onclick = () => sendCommand('right');
        document.getElementById('start').onclick = () => sendCommand('start');
        document.getElementById('stop').onclick = () => sendCommand('stop');

        setInterval(pollMartianAlert, 500);

        log("GUI loaded.");
        log(`Using API base: ${BASE}`);
    </script>
</body>
</html>
